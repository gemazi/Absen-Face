console.log("FACE API LOADED");
<video id="video" width="360" height="270" autoplay muted></video>
<div id="status">Memuat model...</div>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwCdu8ZYh8yGJecbwmuscOgzFrwdi_k1cFhSAK3LFi03g-Uk-6UXby4-TEFpvevySK-/exec";

// Load camera
const video = document.getElementById('video');
navigator.mediaDevices.getUserMedia({video:true}).then(stream=>video.srcObject=stream);

// Load models
Promise.all([
  faceapi.nets.ssdMobilenetv1.loadFromUri('./models'),
  faceapi.nets.faceRecognitionNet.loadFromUri('./models'),
  faceapi.nets.faceLandmark68Net.loadFromUri('./models')
]).then(startRecognition);

async function loadLabeledImages(){
  const labels = ['GemaMahardhika','RinaSaputri'];
  return Promise.all(labels.map(async label=>{
    const img = await faceapi.fetchImage(`./faces/${label}.jpeg`);
    const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
    return new faceapi.LabeledFaceDescriptors(label,[detections.descriptor]);
  }));
}

async function startRecognition(){

  document.getElementById('status').innerText='Model berhasil dimuat';

  const labeledDescriptors = await loadLabeledImages();

  document.getElementById('status').innerText='Wajah referensi berhasil dimuat';

  const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors,0.6);

  const status = document.getElementById('status');

  video.addEventListener('play', async ()=>{

    const canvas = faceapi.createCanvasFromMedia(video);
    document.body.append(canvas);

    const displaySize = {
      width: video.width,
      height: video.height
    };

    faceapi.matchDimensions(canvas, displaySize);

    setInterval(async ()=>{

      const detections = await faceapi
        .detectAllFaces(video)
        .withFaceLandmarks()
        .withFaceDescriptors();

      const resizedDetections = faceapi.resizeResults(detections, displaySize);

      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);

      faceapi.draw.drawDetections(canvas,resizedDetections);

      for(const det of resizedDetections){

        const bestMatch = faceMatcher.findBestMatch(det.descriptor);

        if(bestMatch.label !== 'unknown'){

          status.innerText = `Wajah dikenali: ${bestMatch.label}`;

          // GPS
          const lokasi = await new Promise(resolve=>{
            navigator.geolocation.getCurrentPosition(pos=>{
              resolve({
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude
              });
            }, err=>resolve({
              latitude:'',
              longitude:''
            }));
          });

          // Foto
          const canvasFoto = document.createElement('canvas');

          canvasFoto.width = video.videoWidth;
          canvasFoto.height = video.videoHeight;

          canvasFoto
            .getContext('2d')
            .drawImage(video,0,0);

          const foto = canvasFoto.toDataURL('image/jpeg');

          // Kirim ke Spreadsheet
          fetch(URL_SCRIPT,{
            method:'POST',
            body:JSON.stringify({
              nama: bestMatch.label,
              latitude: lokasi.latitude,
              longitude: lokasi.longitude,
              foto: foto
            })
          });

        } else {

          status.innerText='Wajah tidak dikenal';

        }

      }

    },3000);

  });

}
</script>
